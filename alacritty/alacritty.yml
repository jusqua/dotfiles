env:
  # Set the `$TERM` environment variable
  TERM: xterm-256color

window:
  # Remove windows decorations
  decorations: none
  # Starts in fullscreen
  startup_mode: Fullscreen

scrolling:
  # Scroll limit
  history: 5000
  # Scrolling distance multiplier
  multiplier: 3

font:
  # Uses Hack as Default
  normal:
    family: Hack
  bold:
    family: Hack
  italic:
    family: Hack
  bold_italic:
    family: Hack
  # Font size
  size: 12
  # No extra spaces
  offset:
    x: 0
    y: 0
  glyph_offset:
    x: 0
    y: 0

# https://github.com/zatchheems/tokyo-night-alacritty-theme
colors:
  # Default colors
  primary:
    background: '0x1a1b26'
    foreground: '0xa9b1d6'

  # Normal colors
  normal:
    black:   '0x32344a'
    red:     '0xf7768e'
    green:   '0x9ece6a'
    yellow:  '0xe0af68'
    blue:    '0x7aa2f7'
    magenta: '0xad8ee6'
    cyan:    '0x449dab'
    white:   '0x787c99'

  # Bright colors
  bright:
    black:   '0x444b6a'
    red:     '0xff7a93'
    green:   '0xb9f27c'
    yellow:  '0xff9e64'
    blue:    '0x7da6ff'
    magenta: '0xbb9af7'
    cyan:    '0x0db9d7'
    white:   '0xacb0d0'

bell:
  # Remove bells
  duration: 0

# Cursor config
cursor:
  # Cursor style
  style: beam
  # Blink cursor
  blinking: On

mouse:
  # Hide mouse whem typing
  hide_when_typing: true

